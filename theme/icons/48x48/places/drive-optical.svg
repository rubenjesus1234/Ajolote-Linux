<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- CD/DVD -->
  <defs>
    <linearGradient id="cdGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8E8E8"/>
      <stop offset="50%" style="stop-color:#FFC1CC"/>
      <stop offset="100%" style="stop-color:#A9A9A9"/>
    </linearGradient>
  </defs>
  
  <!-- Sombra -->
  <circle cx="24" cy="26" r="18" fill="#2D2D2D" opacity="0.2"/>
  
  <!-- Disco -->
  <circle cx="24" cy="24" r="18" fill="url(#cdGrad)" stroke="#A9A9A9" stroke-width="1"/>
  
  <!-- Arcoíris sutil -->
  <circle cx="24" cy="24" r="14" fill="none" stroke="#FFB5C5" stroke-width="0.5" opacity="0.5"/>
  <circle cx="24" cy="24" r="12" fill="none" stroke="#64B5F6" stroke-width="0.5" opacity="0.5"/>
  
  <!-- Centro -->
  <circle cx="24" cy="24" r="4" fill="white" stroke="#A9A9A9" stroke-width="0.5"/>
  <circle cx="24" cy="24" r="1.5" fill="#FF91A4"/>
  
  <!-- Brillo -->
  <ellipse cx="18" cy="16" rx="6" ry="4" fill="white" opacity="0.4" transform="rotate(-30 18 16)"/>
</svg>