<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Editor de texto (Mousepad) -->
  <defs>
    <linearGradient id="editorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#64B5F6"/>
      <stop offset="100%" style="stop-color:#42A5F5"/>
    </linearGradient>
  </defs>
  
  <!-- Sombra -->
  <rect x="8" y="8" width="32" height="32" rx="3" fill="#2D2D2D" opacity="0.2"/>
  
  <!-- Ventana -->
  <rect x="6" y="6" width="32" height="32" rx="3" fill="white" stroke="#A9A9A9" stroke-width="1"/>
  
  <!-- Barra de título -->
  <rect x="6" y="6" width="32" height="6" rx="3" fill="url(#editorGrad)"/>
  <rect x="6" y="9" width="32" height="3" fill="url(#editorGrad)"/>
  
  <!-- Botones -->
  <circle cx="12" cy="9" r="1.5" fill="#FF91A4"/>
  <circle cx="17" cy="9" r="1.5" fill="#FFD54F"/>
  <circle cx="22" cy="9" r="1.5" fill="#81C784"/>
  
  <!-- Líneas de código -->
  <rect x="10" y="14" width="4" height="2" rx="0.5" fill="#FF91A4"/>
  <rect x="16" y="14" width="12" height="2" rx="0.5" fill="#81C784"/>
  
  <rect x="10" y="18" width="8" height="2" rx="0.5" fill="#64B5F6"/>
  <rect x="20" y="18" width="6" height="2" rx="0.5" fill="#FFD54F"/>
  
  <rect x="14" y="22" width="10" height="2" rx="0.5" fill="#CE93D8"/>
  
  <rect x="10" y="26" width="6" height="2" rx="0.5" fill="#FF91A4"/>
  <rect x="18" y="26" width="8" height="2" rx="0.5" fill="#81C784"/>
  
  <rect x="10" y="30" width="12" height="2" rx="0.5" fill="#64B5F6"/>
  
  <!-- Cursor -->
  <rect x="24" y="30" width="1" height="3" fill="#2D2D2D">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>
</svg>