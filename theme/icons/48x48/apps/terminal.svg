<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Terminal -->
  <defs>
    <linearGradient id="termGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2D2D2D"/>
      <stop offset="100%" style="stop-color:#1A1A1A"/>
    </linearGradient>
  </defs>
  
  <!-- Sombra -->
  <rect x="5" y="9" width="38" height="30" rx="4" fill="#000000" opacity="0.3"/>
  
  <!-- Ventana -->
  <rect x="4" y="6" width="40" height="32" rx="4" fill="url(#termGrad)" stroke="#808080" stroke-width="1"/>
  
  <!-- Barra de título -->
  <rect x="4" y="6" width="40" height="8" rx="4" fill="#A9A9A9"/>
  <rect x="4" y="10" width="40" height="4" fill="#A9A9A9"/>
  
  <!-- Botones de ventana -->
  <circle cx="10" cy="10" r="2" fill="#FF91A4"/>
  <circle cx="16" cy="10" r="2" fill="#FFC1CC"/>
  <circle cx="22" cy="10" r="2" fill="#81C784"/>
  
  <!-- Texto del terminal -->
  <text x="8" y="22" font-family="monospace" font-size="6" fill="#FFC1CC">$</text>
  <text x="14" y="22" font-family="monospace" font-size="5" fill="#81C784">ajolote</text>
  <text x="8" y="30" font-family="monospace" font-size="5" fill="#FFC1CC">_</text>
  
  <!-- Cursor parpadeante -->
  <rect x="12" y="26" width="4" height="6" fill="#FF91A4" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.3;0.8" dur="1s" repeatCount="indefinite"/>
  </rect>
</svg>