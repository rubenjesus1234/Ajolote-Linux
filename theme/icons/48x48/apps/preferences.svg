<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Preferencias -->
  <defs>
    <linearGradient id="prefsGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#CE93D8"/>
      <stop offset="100%" style="stop-color:#AB47BC"/>
    </linearGradient>
  </defs>
  
  <!-- Sombra -->
  <rect x="6" y="6" width="36" height="36" rx="4" fill="#2D2D2D" opacity="0.2"/>
  
  <!-- Fondo -->
  <rect x="4" y="4" width="36" height="36" rx="4" fill="url(#prefsGrad)" stroke="#9C27B0" stroke-width="1"/>
  
  <!-- Brillo -->
  <rect x="6" y="6" width="32" height="8" rx="4" fill="white" opacity="0.3"/>
  
  <!-- Engranaje pequeño -->
  <circle cx="24" cy="24" r="8" fill="none" stroke="white" stroke-width="2"/>
  <circle cx="24" cy="24" r="3" fill="white"/>
  
  <!-- Dientes -->
  <line x1="24" y1="14" x2="24" y2="18" stroke="white" stroke-width="2"/>
  <line x1="24" y1="30" x2="24" y2="34" stroke="white" stroke-width="2"/>
  <line x1="14" y1="24" x2="18" y2="24" stroke="white" stroke-width="2"/>
  <line x1="30" y1="24" x2="34" y2="24" stroke="white" stroke-width="2"/>
</svg>