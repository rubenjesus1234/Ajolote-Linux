<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Pegar -->
  <defs>
    <linearGradient id="pasteGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFB5C5"/>
      <stop offset="100%" style="stop-color:#FF91A4"/>
    </linearGradient>
  </defs>
  
  <!-- Sombra -->
  <rect x="8" y="8" width="32" height="36" rx="2" fill="#2D2D2D" opacity="0.2"/>
  
  <!-- Portapapeles -->
  <rect x="6" y="12" width="32" height="30" rx="2" fill="#E8E8E8" stroke="#A9A9A9" stroke-width="0.5"/>
  
  <!-- Clip -->
  <rect x="18" y="6" width="12" height="10" rx="2" fill="url(#pasteGrad)" stroke="#FF91A4" stroke-width="0.5"/>
  <rect x="20" y="8" width="8" height="6" rx="1" fill="white" opacity="0.5"/>
  
  <!-- Papel -->
  <rect x="10" y="18" width="24" height="20" rx="1" fill="white" stroke="#A9A9A9" stroke-width="0.5"/>
  
  <!-- Líneas -->
  <line x1="14" y1="24" x2="30" y2="24" stroke="#FFB5C5" stroke-width="1.5"/>
  <line x1="14" y1="28" x2="26" y2="28" stroke="#E8E8E8" stroke-width="1.5"/>
  <line x1="14" y1="32" x2="28" y2="32" stroke="#E8E8E8" stroke-width="1.5"/>
</svg>