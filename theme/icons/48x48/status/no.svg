<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Prohibido/No symbol -->
  <defs>
    <linearGradient id="noGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E57373"/>
      <stop offset="100%" style="stop-color:#EF5350"/>
    </linearGradient>
  </defs>
  
  <!-- Sombra -->
  <circle cx="24" cy="26" r="16" fill="#2D2D2D" opacity="0.2"/>
  
  <!-- Círculo -->
  <circle cx="24" cy="24" r="16" fill="url(#noGrad)" stroke="#E53935" stroke-width="1"/>
  
  <!-- Brillo -->
  <ellipse cx="18" cy="16" rx="5" ry="4" fill="white" opacity="0.3" transform="rotate(-30 18 16)"/>
  
  <!-- Línea diagonal -->
  <line x1="12" y1="12" x2="36" y2="36" stroke="white" stroke-width="4" stroke-linecap="round"/>
</svg>