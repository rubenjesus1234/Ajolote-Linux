<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Batería -->
  <defs>
    <linearGradient id="battGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#81C784"/>
      <stop offset="100%" style="stop-color:#66BB6A"/>
    </linearGradient>
  </defs>
  
  <!-- Sombra -->
  <rect x="8" y="14" width="32" height="20" rx="3" fill="#2D2D2D" opacity="0.2"/>
  
  <!-- Cuerpo batería -->
  <rect x="6" y="12" width="32" height="20" rx="3" fill="#E8E8E8" stroke="#A9A9A9" stroke-width="1"/>
  
  <!-- Nivel de carga -->
  <rect x="8" y="14" width="24" height="16" rx="2" fill="url(#battGrad)"/>
  
  <!-- Terminal -->
  <rect x="38" y="18" width="4" height="8" rx="1" fill="#A9A9A9"/>
  
  <!-- Brillo -->
  <rect x="8" y="14" width="24" height="4" rx="2" fill="white" opacity="0.3"/>
  
  <!-- Porcentaje -->
  <text x="20" y="26" font-family="Arial, sans-serif" font-size="8" fill="white" text-anchor="middle" font-weight="bold">80%</text>
</svg>