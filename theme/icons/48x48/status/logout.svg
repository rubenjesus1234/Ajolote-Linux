<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Salir/Logout -->
  <defs>
    <linearGradient id="logoutGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF91A4"/>
      <stop offset="100%" style="stop-color:#E57373"/>
    </linearGradient>
  </defs>
  
  <!-- Sombra -->
  <circle cx="24" cy="26" r="16" fill="#2D2D2D" opacity="0.2"/>
  
  <!-- Círculo -->
  <circle cx="24" cy="24" r="16" fill="url(#logoutGrad)" stroke="#E53935" stroke-width="1"/>
  
  <!-- Brillo -->
  <ellipse cx="18" cy="16" rx="5" ry="4" fill="white" opacity="0.3" transform="rotate(-30 18 16)"/>
  
  <!-- Puerta -->
  <rect x="12" y="18" width="14" height="16" rx="1" fill="none" stroke="white" stroke-width="2"/>
  
  <!-- Flecha -->
  <path d="M 24,26 L 36,26" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 32,22 L 36,26 L 32,30" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Manija -->
  <rect x="22" y="24" width="2" height="4" rx="1" fill="white"/>
</svg>