<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Spinner/Cargando -->
  <defs>
    <linearGradient id="spinnerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFB5C5"/>
      <stop offset="100%" style="stop-color:#FF91A4"/>
    </linearGradient>
  </defs>
  
  <!-- Círculo de fondo -->
  <circle cx="24" cy="24" r="16" fill="none" stroke="#E8E8E8" stroke-width="3"/>
  
  <!-- Arco animado -->
  <circle cx="24" cy="24" r="16" fill="none" stroke="url(#spinnerGrad)" stroke-width="3" 
          stroke-dasharray="30 70" stroke-linecap="round">
    <animateTransform attributeName="transform" type="rotate" values="0 24 24;360 24 24" dur="1s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Centro -->
  <circle cx="24" cy="24" r="4" fill="#FF91A4"/>
</svg>