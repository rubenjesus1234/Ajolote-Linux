<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Progreso -->
  <defs>
    <linearGradient id="progressGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFB5C5"/>
      <stop offset="100%" style="stop-color:#FF91A4"/>
    </linearGradient>
  </defs>
  
  <!-- Sombra -->
  <rect x="6" y="18" width="36" height="12" rx="6" fill="#2D2D2D" opacity="0.2"/>
  
  <!-- Fondo -->
  <rect x="4" y="16" width="36" height="12" rx="6" fill="#E8E8E8" stroke="#A9A9A9" stroke-width="1"/>
  
  <!-- Barra de progreso -->
  <rect x="6" y="18" width="20" height="8" rx="4" fill="url(#progressGrad)"/>
  
  <!-- Brillo -->
  <rect x="6" y="18" width="20" height="3" rx="2" fill="white" opacity="0.3"/>
  
  <!-- Porcentaje -->
  <text x="24" y="38" font-family="Arial, sans-serif" font-size="8" fill="#808080" text-anchor="middle">60%</text>
</svg>