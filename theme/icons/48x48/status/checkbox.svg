<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Checkbox -->
  <defs>
    <linearGradient id="checkBgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFB5C5"/>
      <stop offset="100%" style="stop-color:#FF91A4"/>
    </linearGradient>
  </defs>
  
  <!-- Sombra -->
  <rect x="8" y="8" width="28" height="28" rx="4" fill="#2D2D2D" opacity="0.2"/>
  
  <!-- Cuadrado -->
  <rect x="6" y="6" width="28" height="28" rx="4" fill="url(#checkBgGrad)" stroke="#FF91A4" stroke-width="2"/>
  
  <!-- Brillo -->
  <rect x="8" y="8" width="24" height="8" rx="3" fill="white" opacity="0.3"/>
  
  <!-- Check -->
  <path d="M 12,20 L 18,26 L 30,14" stroke="white" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>