<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Apagar/Shutdown -->
  <defs>
    <linearGradient id="shutdownGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF91A4"/>
      <stop offset="100%" style="stop-color:#E57373"/>
    </linearGradient>
  </defs>
  
  <!-- Sombra -->
  <circle cx="24" cy="26" r="16" fill="#2D2D2D" opacity="0.2"/>
  
  <!-- Círculo -->
  <circle cx="24" cy="24" r="16" fill="url(#shutdownGrad)" stroke="#E53935" stroke-width="1"/>
  
  <!-- Brillo -->
  <ellipse cx="18" cy="16" rx="5" ry="4" fill="white" opacity="0.3" transform="rotate(-30 18 16)"/>
  
  <!-- Símbolo de apagado -->
  <path d="M 24,10 L 24,26" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <path d="M 16,18 Q 16,32 24,32 Q 32,32 32,18" stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>
</svg>