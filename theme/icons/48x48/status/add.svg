<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Agregar/Plus -->
  <defs>
    <linearGradient id="addGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#81C784"/>
      <stop offset="100%" style="stop-color:#66BB6A"/>
    </linearGradient>
  </defs>
  
  <!-- Sombra -->
  <circle cx="24" cy="26" r="16" fill="#2D2D2D" opacity="0.2"/>
  
  <!-- Círculo -->
  <circle cx="24" cy="24" r="16" fill="url(#addGrad)" stroke="#4CAF50" stroke-width="1"/>
  
  <!-- Brillo -->
  <ellipse cx="18" cy="16" rx="5" ry="4" fill="white" opacity="0.3" transform="rotate(-30 18 16)"/>
  
  <!-- Plus -->
  <line x1="24" y1="14" x2="24" y2="34" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="14" y1="24" x2="34" y2="24" stroke="white" stroke-width="3" stroke-linecap="round"/>
</svg>