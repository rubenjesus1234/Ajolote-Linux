<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Cancelar -->
  <defs>
    <linearGradient id="cancelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A9A9A9"/>
      <stop offset="100%" style="stop-color:#808080"/>
    </linearGradient>
  </defs>
  
  <!-- Sombra -->
  <circle cx="24" cy="26" r="16" fill="#2D2D2D" opacity="0.2"/>
  
  <!-- Círculo -->
  <circle cx="24" cy="24" r="16" fill="url(#cancelGrad)" stroke="#696969" stroke-width="1"/>
  
  <!-- Brillo -->
  <ellipse cx="18" cy="16" rx="5" ry="4" fill="white" opacity="0.3" transform="rotate(-30 18 16)"/>
  
  <!-- X -->
  <line x1="16" y1="16" x2="32" y2="32" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="32" y1="16" x2="16" y2="32" stroke="white" stroke-width="3" stroke-linecap="round"/>
</svg>