<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Archivo de video -->
  <defs>
    <linearGradient id="videoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF8A65"/>
      <stop offset="100%" style="stop-color:#FF7043"/>
    </linearGradient>
  </defs>
  
  <!-- Sombra -->
  <rect x="10" y="6" width="28" height="36" rx="2" fill="#2D2D2D" opacity="0.2"/>
  
  <!-- Papel -->
  <rect x="8" y="4" width="28" height="36" rx="2" fill="white" stroke="#A9A9A9" stroke-width="0.5"/>
  
  <!-- Pantalla de video -->
  <rect x="12" y="10" width="20" height="14" rx="2" fill="#2D2D2D"/>
  
  <!-- Play button -->
  <path d="M 20,14 L 28,18 L 20,22 Z" fill="url(#videoGrad)"/>
  
  <!-- Líneas de video -->
  <rect x="12" y="28" width="18" height="2" rx="1" fill="#FF8A65" opacity="0.6"/>
  <rect x="12" y="32" width="12" height="2" rx="1" fill="#E8E8E8"/>
  
  <!-- Esquina doblada -->
  <path d="M 28,4 L 36,4 L 36,12 Z" fill="#FF8A65" opacity="0.5"/>
</svg>