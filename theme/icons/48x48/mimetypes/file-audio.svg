<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Archivo de audio -->
  <defs>
    <linearGradient id="audioGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#CE93D8"/>
      <stop offset="100%" style="stop-color:#AB47BC"/>
    </linearGradient>
  </defs>
  
  <!-- Sombra -->
  <rect x="10" y="6" width="28" height="36" rx="2" fill="#2D2D2D" opacity="0.2"/>
  
  <!-- Papel -->
  <rect x="8" y="4" width="28" height="36" rx="2" fill="white" stroke="#A9A9A9" stroke-width="0.5"/>
  
  <!-- Onda de audio -->
  <path d="M 12,20 L 14,16 L 16,24 L 18,12 L 20,28 L 22,14 L 24,22 L 26,18 L 28,26 L 30,20 L 32,24 L 34,16" 
        stroke="url(#audioGrad)" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Líneas decorativas -->
  <rect x="12" y="30" width="16" height="2" rx="1" fill="#CE93D8" opacity="0.6"/>
  <rect x="12" y="34" width="10" height="2" rx="1" fill="#E8E8E8"/>
  
  <!-- Esquina doblada -->
  <path d="M 28,4 L 36,4 L 36,12 Z" fill="#CE93D8" opacity="0.5"/>
</svg>